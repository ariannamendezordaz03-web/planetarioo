<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hydra Sublenguaje</title>
  <script src="https://unpkg.com/hydra-synth"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #input {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      height: 80px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 18px;
      border: 2px solid white;
      border-radius: 10px;
      padding: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
      resize: none;
    }
  </style>
</head>
<body>
  <textarea id="input" placeholder="Escribe: pabaras y letras cortas"></textarea>

  <script>
    const hydra = new Hydra({ detectAudio: false });

    const palabras = {
      neptuno: ()=>(100,0.3,-19).rotate(0,0.1).modulate(osc(6).rotate(9,9)).mask(shape(60)).blend(o1,0.01).scale(1,2,4).color(1,1,25),
      urano: ()=>(-2,0,-2).color(-1,0,.5).modulate(noise(2,0.5,-6)).modulateScale(voronoi(.1)).modulateKaleid(noise(10),0.1,1).diff(shape(600).scale(.2,1,2)),
      saturno: ()=>(-5,1,-1).color(1,1,.5).modulate(noise(12,0.5,-6)).modulateScale(voronoi(1)).modulateKaleid(osc(8),0.1,1).diff(shape(600)).scale(1.6,1,2),
      jupiter: ()=>(4,0.2,1).color(1,0,2).modulateScale(osc(40,0,1).kaleid(8)).colorama(1).modulate((shape(106,1,0.05))).mult(shape(106,1,0.05)),
      marte: ()=>(200,0.5,1.5).scale(0.5,0.5).color([2.5,2]).modulateScale(osc(3,0.5),-0.6).scale(0.9),
      tierra: ()=>(13, 0, 1).mask(shape(4, 0.3, 1)).modulateRotate(shape(4, 0.1, 0.9)).diff(shape(60)).scale(4,1,2).scale(0.3).scale(() => Math.sin(time*9)*4 + 1).add(shape(4, 0.2, 0.923).color(1, 4, 8)).colorama(5).mult(osc(50,-0.1,8).kaleid(12)).mask(shape(60).scale(1.4,1,2)),
      venus: ()=>(100,-0.0018,0.17).diff(osc(20,0.00008)).modulateScale(noise(1.5,0.18)).color(11, 0.9, 0.011, 5, 22,  0.5, -1).contrast(1.4).add(src(o0).modulate(o0,.04),.6, .9).mask(shape(60).scale(1.2,1,2)),
      mercurio: ()=>(100,-0.0018,0.17).diff(osc(20,0.00008).rotate(Math.PI/0.0002)).modulateScale(noise(1.5,0.18).modulateScale(osc(13).rotate(()=>Math.sin(time/2))),4).color(1,0.5,0.4, 0.9, 0.2, 0.011, 5, 22,  0.5, -1).contrast(1.4).mask(shape(300)).scale(1,1,2).add(src(o0).modulate(o0,.04),.6, .9),
      sol: ()=>(2).colorama(.2).repeat(2,8,4).kaleid(() => mouse.x *.110).color(2,1,.03).modulateScrollX(osc(1,1,4)).mask(shape(200,0.5,.5)).modulate(voronoi(25,6,2)),
      
  





      




      

     

magt : () => {
  osc(40,0.5,() => a.fft[0]*200).out(o2)
  let shape = osc(60, 0.1, 2)
    .mult(noise(1, 4))
    .rotate(() => (Math.random() - 0.5) * 0.5 + Math.sin(time * 0.2) * 0.2)
  shape.out(o0)
  return shape
},
};

    const input = document.getElementById("input");

    input.addEventListener("input", () => {
      const texto = input.value.toLowerCase().trim();

      // Si contiene comas: modulación encadenada
      if (texto.includes(",")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulate(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si contiene comas: modulación encadenada
      if (texto.includes("x")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulateScale(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si no hay coma, renderiza todo en capas independientes
      const entradas = texto.split(/\s+/).map(w => w.trim()).filter(w => palabras[w]);
      if (entradas.length > 0) {
        // Componer blend entre todas
        let comp = palabras[entradas[0]]();
        for (let i = 1; i < entradas.length; i++) {
          comp = comp.diff(palabras[entradas[i]](), 0.5);
        }
        comp.out();
      }
    });
  </script>
</body>
</html>
